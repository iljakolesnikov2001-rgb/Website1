<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVITrans</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8f8fa;
      color: #4f5d73;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.96), rgba(244,244,247,0.94) 65%, rgba(238,238,242,0.96));
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 52px 86px 0 86px;
      position: relative;
      z-index: 2;
    }

    .logo {
      font-size: 67px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #2f4f79;
      line-height: 1;
      user-select: none;
    }

    .logo span {
      font-weight: 700;
    }

    .center-nav {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      margin-left: auto;
      margin-right: 76px;
    }

    .nav-btn,
    .footer-link {
      border: 1px solid #ececf0;
      background: linear-gradient(to bottom, #ffffff, #f0f0f3);
      color: #69778b;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset, 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .nav-btn {
      width: 145px;
      height: 53px;
      font-size: 25px;
      font-weight: 600;
    }

    .login-card {
      width: 323px;
      border: 1px solid #ececf0;
      border-radius: 8px;
      background: rgba(255,255,255,0.72);
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      padding: 16px 18px 20px;
      backdrop-filter: blur(1px);
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #44556e;
      margin-bottom: 18px;
    }

    .input {
      width: 100%;
      height: 42px;
      border-radius: 7px;
      border: 1px solid #e4e6ea;
      margin-bottom: 10px;
      padding: 0 14px;
      font-size: 18px;
      color: #6a7380;
      background: linear-gradient(to bottom, #fefefe, #f7f7f8);
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
    }

    .input::placeholder {
      color: #7d8794;
    }

    .login-btn {
      width: 100%;
      height: 47px;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      background: linear-gradient(to bottom, #7fb1ea, #5f94d7);
      color: #f2f5fb;
      font-size: 21px;
      font-weight: 400;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 2px 4px rgba(0,0,0,0.08);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #dfdfe3;
      margin-top: 60px;
      position: relative;
      z-index: 1;
    }

    .hero {
      position: relative;
      min-height: 660px;
      overflow: hidden;
    }

    .truck-wrap {
      position: absolute;
      right: 188px;
      top: 118px;
      width: 620px;
      z-index: 2;
    }

    .truck-wrap img {
      width: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 16px 12px rgba(0,0,0,0.10));
    }

    .truck-shadow {
      position: absolute;
      width: 420px;
      height: 34px;
      right: 250px;
      bottom: 118px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.16) 0%, rgba(0,0,0,0.08) 38%, rgba(0,0,0,0.02) 70%, rgba(0,0,0,0) 100%);
      filter: blur(8px);
      z-index: 1;
    }

    .footer-links {
      position: absolute;
      left: 96px;
      bottom: 54px;
      display: flex;
      gap: 16px;
      z-index: 3;
      flex-wrap: wrap;
    }

    .footer-link {
      height: 56px;
      padding: 0 24px;
      font-size: 23px;
      color: #7a8ea6;
      min-width: 164px;
    }

    .footer-link.small {
      min-width: 196px;
    }

    .footer-link.dark {
      min-width: 210px;
    }

    .fake-icon {
      margin-right: 10px;
      font-size: 22px;
      opacity: 0.95;
    }

    @media (max-width: 1300px) {
      .topbar {
        flex-wrap: wrap;
        gap: 28px;
      }

      .center-nav {
        order: 3;
        margin: 0;
      }

      .truck-wrap {
        right: 70px;
        width: 520px;
      }
    }

    @media (max-width: 980px) {
      .topbar {
        padding: 32px 24px 0;
        flex-direction: column;
        align-items: flex-start;
      }

      .logo {
        font-size: 54px;
      }

      .center-nav {
        margin-right: 0;
      }

      .login-card {
        width: 100%;
        max-width: 360px;
      }

      .divider {
        margin-top: 34px;
      }

      .hero {
        min-height: 780px;
      }

      .truck-wrap {
        position: relative;
        right: auto;
        top: 70px;
        width: min(90vw, 560px);
        margin-left: auto;
        margin-right: auto;
      }

      .truck-shadow {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        bottom: 150px;
      }

      .footer-links {
        left: 24px;
        right: 24px;
        bottom: 28px;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="logo">SVI<span>Trans</span></div>

      <nav class="center-nav">
        <a class="nav-btn" href="#">Galerēja</a>
        <a class="nav-btn" href="#">Kontakti</a>
      </nav>

      <section class="login-card">
        <div class="login-title">LOGIN:</div>
        <input class="input" type="text" placeholder="Login:" />
        <input class="input" type="password" placeholder="Pass:" />
        <button class="login-btn">Pieslēgties</button>
      </section>
    </header>

    <div class="divider"></div>

    <main class="hero">
      <div class="truck-wrap">
        <img src="https://pngimg.com/d/truck_PNG16240.png" alt="Truck" />
      </div>
      <div class="truck-shadow"></div>

      <div class="footer-links">
        <a class="footer-link" href="#"><span class="fake-icon">◔</span> CSDD.lv</a>
        <a class="footer-link" href="#"><span class="fake-icon">◒</span> ATD.lv</a>
        <a class="footer-link small" href="#"><span class="fake-icon">▸</span> LV|Vi<sup>G</sup>en</a>
        <a class="footer-link dark" href="#"><span class="fake-icon">1V</span> Veiniette.eu</a>
      </div>
    </main>
  </div>
</body>
</html>
